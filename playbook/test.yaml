- name: RouterOS Connection (Fixed Agent Mode)
  hosts: 10.254.1.64
  gather_facts: false
#  connection: ansible.netcommon.network_cli
  vars:
#    ansible_network_os: community.routeros.routeros
    ansible_user: awx
#    ansible_port: 22

    # 🔧 Исправлено: 'ssh' не валиден. Используем paramiko (стабильнее с агентом)
#    ansible_network_cli_ssh_type: paramiko

    # 🚫 Очищаем путь к файлу, чтобы paramiko НЕ пытался читать диск,
    # а использовал ssh-agent (AWX уже добавил ключ: Identity added...)
#    ansible_ssh_private_key_file: ""

#    ansible_ssh_common_args: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
    # 🔑 КРИТИЧНО: Говорим Ansible использовать SSH-Agent, а не файл
    ansible_ssh_use_ssh_agent: true

    # Очищаем путь к файлу, чтобы модуль не пытался его открыть
    ansible_ssh_private_key_file: ""

    # Используем libssh (он лучше дружит с агентом в контейнерах)
    ansible_network_cli_ssh_type: libssh

  tasks:
    - name: Verify SSH Agent is active
      ansible.builtin.debug:
        msg: "🔑 SSH_AUTH_SOCK: {{ lookup('env', 'SSH_AUTH_SOCK') | default('NOT SET') }}"

    - name: Debug host groups and variables
      debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Groups: {{ group_names }}"
          - "All variables:"
          - "  ansible_user: {{ ansible_user | default('NOT SET') }}"
          - "  ansible_password: {{ 'SET' if ansible_password is defined else 'NOT SET' }}"
          - "  ansible_network_os: {{ ansible_network_os | default('NOT SET') }}"
          - "  ansible_connection: {{ ansible_connection | default('NOT SET') }}"
      run_once: yes

#    - name: Debug SSH connection details
#      ansible.builtin.raw: "cat /runner/artifacts/{{ awx_job_id }}/ssh_key_data"
#      register: file_output
#
#    - name: Show SSH key file content
#      debug:
#        msg: "SSH key file content: {{ file_output.stdout }}"

    - name: Test RouterOS connection
      community.routeros.command:
        commands:
          - /system resource print
      vars:
        ansible_ssh_private_key_file: "/runner/artifacts/{{ awx_job_id }}/ssh_key_data"
      register: result

    - name: Show output
      ansible.builtin.debug:
        var: result.stdout_lines | default(result.msg)