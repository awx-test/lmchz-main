- name: Debug MikroTik Host Vars
  hosts: 10.254.1.64  # Замените на имя/IP хоста из вашего инвентаря
  gather_facts: false
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_user: awx
    ansible_port: 22
    ansible_ssh_private_key_file: "/runner/artifacts/{{ awx_job_id }}/ssh_key_data"

  pre_tasks:
    # 1. Находим ключ надёжным способом (shell не зависит от модулей Ansible)
    - name: Find SSH key path
      ansible.builtin.shell: ls -t /runner/artifacts/*/ssh_key_data 2>/dev/null | head -1
      register: key_search
      delegate_to: localhost
      run_once: true
      changed_when: false

    - name: Fail if key missing
      ansible.builtin.fail:
        msg: |
          🔑 SSH key not found in /runner/artifacts!
          Проверьте: Credential типа "Machine" привязан к Job Template и содержит SSH Private Key.
      when: key_search.stdout == ""

    # 2. Копируем в /tmp и делаем читаемым для UID 1000
    - name: Copy key to /tmp & fix permissions
      ansible.builtin.command: >
        bash -c "cp '{{ key_search.stdout }}' /tmp/awx_ros_key && chmod 644 /tmp/awx_ros_key"
      delegate_to: localhost
      run_once: true
      changed_when: false

    # 3. Передаём стабильный путь в network_cli
    - name: Set key path
      ansible.builtin.set_fact:
        ansible_ssh_private_key_file: /tmp/awx_ros_key

    - name: Debug resolved config
      ansible.builtin.debug:
        msg: "✅ Key: {{ ansible_ssh_private_key_file }} | SSH type: {{ ansible_network_cli_ssh_type }}"


  tasks:
    - name: Show actual auth vars passed to network_cli
      ansible.builtin.debug:
        msg: |
          📋 Network Auth Variables:
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          ansible_user: {{ ansible_user }}
          ansible_connection: {{ ansible_connection }}
          HOME: {{ lookup('env', 'HOME') }}
          
          🔑 If key path is NOT SET → AWX didn't inject it for network_cli.
          🛠️ Fix: Ensure Credential type is "Machine" and attached to Job Template.

    - name: Test connection
      community.routeros.command:
        commands: /system resource print
      vars:
        ansible_network_cli_ssh_type: libssh
        ansible_ssh_extra_args: >-
          -o IdentityFile={{ ansible_ssh_private_key_file }}
          -o IdentitiesOnly=yes
          -o StrictHostKeyChecking=no
          -o PreferredAuthentications=publickey
      register: test_result
      ignore_errors: true

    - name: Show connection result
      ansible.builtin.debug:
        var: test_result