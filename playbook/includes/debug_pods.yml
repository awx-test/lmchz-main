    - name: Get list of pods in namespace lmchz
      kubernetes.core.k8s_info:
        host: "{{ k8s_host }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: "{{ k8s_validate_certs }}"
        kind: Pod
        namespace: "lmchz"
      register: pod_list

    - name: Match pod by name
      set_fact:
        target_pod: "{{ pod_list.resources | selectattr('metadata.name', 'match', '^' + resource_name + '-') | first }}"
      when: pod_list.resources is defined

    - name: Set facts for target pod
      set_fact:
        pod_name: "{{ target_pod.metadata.name }}"
        node_name: "{{ target_pod.spec.nodeName }}"
        pod_ip: "{{ target_pod.status.podIP }}"
        host_ip: "{{ target_pod.status.hostIP }}"
        phase: "{{ target_pod.status.phase }}"
      when: target_pod is defined

    - name: Debug facts for target pod
      debug:
        msg:
          - "Имя: {{ pod_name }}"
          - "Нода: {{ node_name }}"
          - "IP ноды: {{ host_ip }}"
          - "IP пода: {{ pod_ip }}"
          - "Статус: {{ phase }}"
      when: target_pod is defined

    - name: Error if pod not found
      fail:
        msg: "Под с именем {{ resource_name }} не найден в namespace lmchz"
      when: target_pod is not defined