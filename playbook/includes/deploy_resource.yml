    - name: Render manifest from Jinja2 template
      ansible.builtin.debug:
        msg: "Deploying {{ resource_name_log }} to {{ k8s_host }}"

    - name: Apply deploy to Kubernetes cluster
      kubernetes.core.k8s:
        state: "{{ current_state }}"
        definition: "{{ lookup('template', path_template) | from_yaml }}"
        host: "{{ k8s_host }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: "{{ k8s_validate_certs | default(false) }}"
        wait: true
        wait_timeout: 300
      register: deploy_result

    - name: Show deploy result
      ansible.builtin.debug:
        var: deploy_result.result | default(deploy_result)