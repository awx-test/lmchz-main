- name: Deploy application to Kubernetes cluster
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Render manifest from Jinja2 template
      ansible.builtin.debug:
        msg: "Deploying {{ resource_name }} to {{ k8s_host }}"

    - name: Apply deploy to Kubernetes cluster
      kubernetes.core.k8s:
        state: present
        # Рендерим шаблон и парсим YAML в словарь
        definition: "{{ lookup('template', path_template) | from_yaml }}"
        # Параметры подключения к API
        host: "{{ k8s_host }}"
        validate_certs: "{{ k8s_validate_certs }}"
        ca_cert: "{{ k8s_ca_cert | default(omit) }}"
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        # Опционально: ждать готовности деплоймента
        wait: true
        wait_timeout: 300
      register: deploy_result

    - name: Show deploy result
      ansible.builtin.debug:
        var: deploy_result.result | default(deploy_result)