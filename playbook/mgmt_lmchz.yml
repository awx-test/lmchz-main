---
- name: Download vars table
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create directory
      file:
        path: "../file"
        state: directory
        mode: '0755'

    - name: Download CSV with curl
      command: >
        curl -L --connect-timeout 30 --max-time 120
        -o "../file/usbdata.csv"
        "https://docs.google.com/spreadsheets/d/{{ tokengoogleegs }}/export?format=csv&sheet=ro"
      args:
        creates: "../file/usbdata.csv"
      register: curl_download
      ignore_errors: yes

    - name: Check curl result
      debug:
        var: curl_download

    - name: Verify file exists
      stat:
        path: "../file/usbdata.csv"
      register: file_stat

    - name: Show file info
      debug:
        msg: "File size: {{ file_stat.stat.size }} bytes"
      when: file_stat.stat.exists


#    - name: Download file with var
#      ansible.builtin.get_url:
#        url: https://docs.google.com/spreadsheets/d/{{ tokengoogleegs }}/export?format=csv&sheet=ro
#        dest: ../file/usbdata.csv
#        mode: '0755'

- name: Get var from csv file
  hosts: localhost
  gather_facts: false
  vars:
    nstroki:     35
    path_csv:    ../file/usbdata.csv
    magadr:      "{{ lookup('csvfile','{{ nstroki }} file={{ path_csv }} delimiter=, col=6') }}"
    mtip:        "{{ lookup('csvfile','{{ nstroki }} file={{ path_csv }} delimiter=, col=2') | replace('.','.')}}"
    service_ip:        "{{ lookup('csvfile','{{ nstroki }} file={{ path_csv }} delimiter=, col=3') | replace('.','.')}}"
    inn:         "{{ lookup('csvfile','{{ nstroki }} file={{ path_csv }} delimiter=, col=4') }}"
    token:       "{{ lookup('csvfile','{{ nstroki }} file={{ path_csv }} delimiter=, col=5') }}"
    state_in_table:     "{{ lookup('csvfile','{{ nstroki }} file={{ path_csv }} delimiter=, col=1') }}"
    resource_name:  "{{ nstroki }}-lmchz-{{ service_ip | replace('10.216.1.','') }}"
    varisok:      0
    current_state: 0
    k8s_host: "https://10.216.1.251:6443"
    k8s_validate_certs: false  # ⚠️ только для dev/staging! Для prod используйте true + ca_cert
    # k8s_ca_cert: "/path/to/ca.crt"  # раскомментируйте для продакшена
    # k8s_kubeconfig: "{{ playbook_dir }}/kubeconfig/config"  # если используете kubeconfig

  tasks:
##############################################################################################################
    - name: Play for lmchz
      ansible.builtin.debug:
        msg: "Запуск плейбука для: {{ nstroki }} / {{ magadr }} / {{ inn }} / {{ resource_name }} / {{ service_ip }} / {{ token }} / {{ state_in_table }}"
##############################################################################################################

    - name: Check var
      ansible.builtin.set_fact:
        varisok: 1
      when:
      # Проверяем чтобы usbkey был правильно введен(1 число от 1 до 99 включительно | 2 число от 1 до 4 включительно | 3 число от 1 до 16 включительно)
        - nstroki >= 1 and nstroki <=249
      # Проверяем что service_ip из диапазона 10.216.1.(1-249)
        - service_ip is regex("^10.216.1.(2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]|[1-9])$")
      # Проверяем что vm_state имеет одно из начений RUN, STOP, DELETE
        - state_in_table == "RUN" or state_in_table == "DELETE"

    - name: SET current_state
      ansible.builtin.set_fact:
        current_state: present
      when:
        - varisok == 1 and state_in_table == "RUN"

    - name: SET current_state DELETE
      ansible.builtin.set_fact:
        current_state: absent
      when:
        - varisok == 1 and state_in_table == "DELETE"

    - name: Deploy ConfigMap
      include_tasks: includes/deploy_resource.yml
      vars:
        resource_name_log: ConfigMap
        path_template: "{{ playbook_dir }}/../templates/configmap.yml.j2"
      register: configmap_deploy_result

    - name: Deploy Deployment
      include_tasks: includes/deploy_resource.yml
      vars:
        resource_name_log: Deployment
        path_template: "{{ playbook_dir }}/../templates/deployment.yml.j2"
      register: deployment_deploy_result

    - name: Получить список всех подов в namespace
      include_tasks: includes/debug_pods.yml
      when:
        - varisok == 1 and current_state == "present"

    - name: Deploy Service
      include_tasks: includes/deploy_resource.yml
      vars:
        resource_name_log: Service
        path_template: "{{ playbook_dir }}/../templates/service.yml.j2"
      register: service_deploy_result

    - name: Check deploy
      ansible.builtin.debug:
        msg: "{{ configmap_deploy_result }} {{ deployment_deploy_result }} {{ service_deploy_result }}"

###########################################################################################################

    - name: Set ip store proxy
      community.routeros.command:
        commands:
          - /ip proxy set cache-path=web-proxy1 enabled=yes max-cache-size=10000KiB src-address="{{ mtip }}"
          - /ip proxy access remove numbers=0
          - delay 1s
          - /ip proxy access remove numbers=1
          - delay 1s
          - /ip proxy access remove numbers=2
          - delay 1s
          - /ip proxy access remove numbers=0
          - delay 1s
          - /ip proxy access remove numbers=1
          - delay 1s
          - /ip proxy access remove numbers=2
          - delay 1s
          - /ip proxy access remove numbers=0
          - delay 1s
          - /ip proxy access remove numbers=1
          - delay 1s
          - /ip proxy access remove numbers=2
          - delay 5s
          - /ip proxy access add src-address="{{ host_ip }}" action=allow
          - delay 5s
          - /ip proxy access add action=deny
      vars:
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: community.routeros.routeros
        ansible_network_cli_ssh_type: paramiko
        ansible_remote_tmp: null
        ansible_ssh_common_args: >
          -o KexAlgorithms=+diffie-hellman-group1-sha1 
          -o HostKeyAlgorithms=+ssh-rsa 
          -o PubkeyAcceptedKeyTypes=+ssh-rsa
      delegate_to: "{{ mtip }}"
      register: proxyset
      when:
        - varisok == 1 and state_in_table == "RUN"

##################################################################################################################

    - name: Pause 15s for up proxy
      ansible.builtin.pause:
        seconds: 15
      when: varisok == 1 and state_in_table == "RUN" and proxyset.changed

    - name: Check lmchz is UP
      ansible.builtin.uri:
        url: "http://{{ service_ip }}:5995/api/v2/status"
        user: "{{ lmchzuser }}"
        password: "{{ lmchzpass }}"
        method: get
        force_basic_auth: true
        status_code: 200
      register: lmchzgetup
      until: lmchzgetup is succeeded
      retries: 6
      delay: 10
      when:
        - varisok == 1 and state_in_table == "RUN"
